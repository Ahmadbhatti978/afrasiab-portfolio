name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      # Custom domain: set repo Variables — VITE_BASE=/  and  VITE_SITE_URL=https://your-domain.com
      # Do NOT use VITE_BASE=./ for GitHub project Pages: without a trailing slash on the URL, ./assets/ resolves to the wrong path and the app white-screens.
      # Optional: CUSTOM_DOMAIN=www.your-domain.com (writes dist/CNAME for Pages)
      - name: Build
        env:
          VITE_BASE_INPUT: ${{ vars.VITE_BASE }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          VITE_BASE_INPUT_TRIMMED="$(echo -n "${VITE_BASE_INPUT:-}" | tr -d '[:space:]')"
          if [ -n "$VITE_BASE_INPUT_TRIMMED" ]; then
            export VITE_BASE="$VITE_BASE_INPUT_TRIMMED"
          elif [ -n "${CUSTOM_DOMAIN:-}" ]; then
            export VITE_BASE="/"
          elif [ "$GITHUB_REPO_NAME" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            # User/org site at https://<owner>.github.io/ — not /repo/
            export VITE_BASE="/"
          else
            export VITE_BASE="/${GITHUB_REPO_NAME}/"
          fi
          echo "VITE_BASE=$VITE_BASE"
          yarn build
          test -f dist/index.html
          grep -q 'type="module"' dist/index.html || (echo "dist/index.html missing module script" && exit 1)

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
