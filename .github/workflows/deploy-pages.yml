name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install
        run: yarn install --frozen-lockfile

      # Custom domain: set repo Variables — VITE_BASE=/  and  VITE_SITE_URL=https://your-domain.com
      # Optional: CUSTOM_DOMAIN=www.your-domain.com (writes dist/CNAME for Pages)
      - name: Build
        env:
          # Safe default for custom domains; override via repo variable VITE_BASE when needed.
          VITE_BASE: ${{ vars.VITE_BASE != '' && vars.VITE_BASE || '/' }}
          VITE_SITE_URL: ${{ vars.VITE_SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
        run: yarn build

      - name: SPA fallback for GitHub Pages
        run: cp dist/index.html dist/404.html

      - name: CNAME for custom domain
        if: ${{ vars.CUSTOM_DOMAIN != '' }}
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
